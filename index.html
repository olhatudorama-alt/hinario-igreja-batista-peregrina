<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hinário Igreja Batista Peregrina</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#FFC72C;
  --bg:#0a0a0a;
  --bg2:#1a1a1a;
  --card:#2a2a2a;
  --text:#ffffff;
  --accent:#FFC72C;
  --font:16px;
}
.light{
  --bg:#f4f4f4;
  --bg2:#ffffff;
  --card:#e6e6e6;
  --text:#111111;
  --accent:#333333;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(135deg,var(--bg),var(--bg2));
  color:var(--text);
  font-family:'Crimson Text',serif;
  font-size:var(--font);
}

/* HEADER PRINCIPAL */
header{
  padding:1.2rem 1.5rem;
  border-bottom:3px solid var(--primary);
}
.header-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.6rem;
}
.header-top{
  display:flex;
  align-items:center;
  gap:.8rem;
}
header img{
  width:52px;
  height:52px;
  flex-shrink:0;
}
h1{
  font-family:'Nunito',sans-serif;
  font-size:1.4rem;
  font-weight:700;
  text-align:center;
  line-height:1.3;
  white-space:normal;
}

.controls{
  display:flex;
  gap:1rem;
  justify-content:center;
}
.controls button{
  background:none;
  border:none;
  color:var(--accent);
  font-size:1.3rem;
  cursor:pointer;
}

.search{padding:1rem 1.5rem}
.search input{
  width:100%;
  padding:.8rem 1rem;
  border-radius:10px;
  border:none;
}

.container{max-width:900px;margin:1.5rem auto;padding:0 1rem}

.playlist-launch{
  display:flex;
  justify-content:flex-end;
  margin-bottom:1rem;
}
.playlist-launch button{
  background:var(--card);
  border:2px solid var(--primary);
  color:var(--accent);
  padding:.5rem .8rem;
  border-radius:8px;
  font-weight:bold;
}

.card{
  background:var(--card);
  padding:1rem;
  border-radius:10px;
  margin-bottom:1rem;
  cursor:pointer;
}
.card:hover{outline:2px solid var(--primary)}
.num{
  background:var(--primary);
  color:#000;
  padding:.2rem .6rem;
  border-radius:6px;
  font-weight:bold;
  margin-right:.5rem;
}

/* OVERLAY DO HINO */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  overflow:auto;
  z-index:10;
}
.overlay.active{display:block}

.detail{
  background:var(--card);
  max-width:900px;
  margin:2rem auto;
  padding:2rem;
  border-radius:15px;
}

.detail-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1rem;
}
.detail-header .back{
  color:var(--accent);
  font-weight:bold;
  cursor:pointer;
}
.detail-controls button{
  background:none;
  border:none;
  color:var(--accent);
  font-size:1.2rem;
  margin-left:.5rem;
  cursor:pointer;
}

.lyrics{
  white-space:pre-wrap;
  line-height:1.8;
  margin:1.5rem 0;
}

audio{width:100%;margin-top:1rem}

.download-btn{
  display:block;
  margin:1.2rem 0;
  color:var(--accent);
  font-weight:bold;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="header-wrapper">
    <div class="header-top">
      <img src="https://i.imgur.com/tXbDnDS.jpeg">
      <h1>Hinário<br>Igreja Batista Peregrina</h1>
    </div>
    <div class="controls">
      <button onclick="toggleTheme()">🌙</button>
      <button onclick="font(-1)">A-</button>
      <button onclick="font(1)">A+</button>
    </div>
  </div>
</header>

<div class="search">
  <input id="search" placeholder="Buscar hino por número ou título...">
</div>

<div class="container">
  <div class="playlist-launch">
    <button onclick="openPlaylist()">▶ Playlist</button>
  </div>
  <div id="list">Carregando hinos…</div>
</div>

<div class="overlay" id="playlistOverlay">
  <div class="detail">
    <div class="detail-header">
      <span class="back" onclick="closePlaylist()">← Voltar ao índice</span>
      <div class="detail-controls">
        <button onclick="font(-1)">A-</button>
        <button onclick="font(1)">A+</button>
      </div>
    </div>
    <h2>▶ Playlist</h2>
    <div style="margin:1rem 0;display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;max-width:360px">
      <button onclick="plPrev()">⏮</button>
      <button onclick="plPlay()" id="plPlayBtn">▶</button>
      <button onclick="plStop()">⏹</button>
      <button onclick="plNext()">⏭</button>
    </div>
    <div id="plNowPlaying"></div>
    <audio id="plPlayer" controls></audio>
    <span class="back" onclick="closePlaylist()">← Voltar ao índice</span>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="detail">
    <div class="detail-header">
      <span class="back" onclick="closeDetail()">← Voltar ao índice</span>
      <div class="detail-controls">
        <button onclick="font(-1)">A-</button>
        <button onclick="font(1)">A+</button>
      </div>
    </div>
    <h2><span id="dnum"></span> – <span id="dtitle"></span></h2>
    <div class="lyrics" id="dlyrics"></div>
    <audio id="player" controls style="display:none"></audio>
    <span class="back" onclick="closeDetail()">← Voltar ao índice</span>
    <a id="downloadLink" class="download-btn" download style="display:none">⬇️ Baixar áudio</a>
  </div>
</div>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQTfKcFZ1dugm9AaT7JhbfXgQGs6x_O328hXdwsG4yYdyjW7sOq0Ctmeqa-m-niFNIqiwvijlDohd6R/pub?output=csv";

/* restante do JS permanece exatamente igual ao seu */
</script>

</body>
</html>
